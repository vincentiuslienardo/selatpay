{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{.Title}}</title>
<style>
body { font-family: -apple-system, system-ui, sans-serif; margin: 24px; color: #1a1a1a; }
h1, h2 { font-weight: 600; }
h2 { margin-top: 32px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 13px; }
th, td { border: 1px solid #e2e2e2; padding: 6px 10px; text-align: left; vertical-align: top; }
th { background: #f5f5f5; font-weight: 600; }
tr:hover td { background: #fafafa; }
a { color: #0a55a8; text-decoration: none; }
a:hover { text-decoration: underline; }
.state { font-family: ui-monospace, monospace; padding: 2px 6px; border-radius: 3px; background: #eef; }
.state-completed { background: #e6f7ec; color: #1a6b39; }
.state-failed { background: #fdecec; color: #8a1a1a; }
.state-pending, .state-funded, .state-settling, .state-paid_out { background: #fff5d6; color: #6b4a00; }
.muted { color: #888; }
.mono { font-family: ui-monospace, monospace; font-size: 12px; }
.summary { display: flex; gap: 16px; flex-wrap: wrap; }
.summary > div { background: #fafafa; border: 1px solid #eee; padding: 8px 12px; border-radius: 4px; min-width: 200px; }
.summary .label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
</style>
</head>
<body>
<header><a href="/">&larr; intents</a></header>
{{block "content" .}}{{end}}
</body>
</html>{{end}}
