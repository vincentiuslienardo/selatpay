run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - revive
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - unconvert
    - nilerr
    - nolintlint

linters-settings:
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow
      - name: error-return
      - name: error-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
