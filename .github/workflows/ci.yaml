name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 -short ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # @v8 is the action major that loads golangci-lint v2 configs.
      # Pin the linter version explicitly so config-schema bumps land
      # alongside an action upgrade rather than silently on a refresh.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m
